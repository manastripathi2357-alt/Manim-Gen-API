<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animatrix Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="login-overlay" class="login-overlay">
        <!-- Login State -->
        <div id="login-container" class="login-container">
            <h2>Welcome to Animatrix</h2>
            <p>Please sign in with Google to generate animations.</p>
            <div id="g_id_onload"
                 data-client_id="295602549979-v72k4qunp6gqfb8meggbatpckahk0rct.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
            <div id="auth-error" class="auth-error" style="display: none; margin-top: 16px;"></div>
        </div>
    </div>

    <div class="app-container" id="app-container" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
            </div>
            <div class="sidebar-history" id="sidebar-history">
                <!-- History items will be injected here -->
            </div>
            <div class="sidebar-footer">
                <div id="user-profile" class="user-profile">
                    <div class="user-avatar">S</div>
                    <span id="username-display">Student1</span>
                    <button id="logout-btn" class="logout-btn" aria-label="Logout">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="chat-container">
            <header class="chat-header" id="chat-header">
                <div class="header-titles">
                    <h1>Animatrix</h1>
                    <p>Your AI Animation Assistant</p>
                </div>
                <button id="mobile-menu-btn" class="mobile-menu-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </header>

            <main class="main-content" id="main-content">
                <!-- Chat State -->
                <div class="chat-history" id="chat-history">
                    <!-- Chat messages will be injected here -->
                    <div class="message assistant-message" id="welcome-message">
                        <div class="avatar">A</div>
                        <div class="content">
                            <p>Hi! I'm Animatrix. Tell me what kind of animation you'd like to create today.</p>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="chat-input-area">
                <form id="chat-form">
                    <textarea id="prompt-input" rows="1" placeholder="Message Animatrix... (e.g. Draw a 3D sphere)"></textarea>
                    <button type="submit" id="send-button" aria-label="Send">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
                <div class="disclaimer">Animatrix uses Manim and Gemini. Video rendering may take a few minutes.</div>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
